<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Task List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1B1F3B;
    --card:#242952;
    --card-edge:#2F356B;
    --field:#1F2447;
    --text:#F1EEE5;
    --muted:#9098C4;
    --muted-dim:#6870A0;
    --urgent:#E8734A;
    --soon:#E8C468;
    --safe:#6C9BC4;
    --done:#5A6098;
    --cat-academic:#C87FA0;
    --cat-personal:#6C9BC4;
    --cat-errand:#8FBF8F;
    --cat-health:#E8A468;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0;
    background:var(--bg);
    font-family:'Inter',sans-serif;
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  .widget{
    width:100%;
    max-width:760px;
    margin:0 auto;
    padding:40px 36px 56px;
    min-height:100vh;
  }
  .header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:26px;
    padding:0 4px;
  }
  .header h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:34px;
    margin:0;
  }
  .header .count{
    font-size:14px;
    color:var(--muted);
    letter-spacing:0.05em;
  }
  .add-row{
    display:flex;
    gap:12px;
    margin-bottom:24px;
  }
  .add-row input[type="text"]{
    flex:1;
    background:var(--field);
    border:1px solid var(--card-edge);
    border-radius:12px;
    padding:16px 18px;
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:16px;
    outline:none;
  }
  .add-row input[type="text"]::placeholder{ color:var(--muted-dim); }
  .add-row input[type="text"]:focus{ border-color:var(--muted); }
  select, .add-row input[type="date"]{
    background:var(--field);
    border:1px solid var(--card-edge);
    border-radius:12px;
    color:var(--muted);
    font-family:'Inter',sans-serif;
    font-size:15px;
    padding:0 14px;
    outline:none;
    height:52px;
  }
  .add-btn{
    background:var(--soon);
    border:none;
    border-radius:12px;
    width:52px;
    height:52px;
    color:#1B1F3B;
    font-size:24px;
    font-weight:700;
    cursor:pointer;
  }
  .add-btn:hover{ opacity:0.9; }
  .filters{
    display:flex;
    gap:8px;
    margin-bottom:22px;
    flex-wrap:wrap;
  }
  .filter-chip{
    font-size:12px;
    letter-spacing:0.04em;
    padding:8px 16px;
    border-radius:20px;
    border:1px solid var(--card-edge);
    color:var(--muted);
    cursor:pointer;
    text-transform:uppercase;
    font-weight:600;
    user-select:none;
  }
  .filter-chip.active{
    background:var(--card-edge);
    color:var(--text);
  }
  .task-list{
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .task{
    background:var(--card);
    border:1px solid var(--card-edge);
    border-left:4px solid var(--safe);
    border-radius:14px;
    padding:20px 22px;
    transition:opacity .2s ease;
  }
  .task.urgent{ border-left-color:var(--urgent); }
  .task.soon{ border-left-color:var(--soon); }
  .task.done{ opacity:0.45; }
  .task-top{
    display:flex;
    align-items:flex-start;
    gap:16px;
  }
  .checkbox{
    width:24px; height:24px;
    border-radius:7px;
    border:2px solid var(--muted-dim);
    flex-shrink:0;
    margin-top:2px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    color:var(--bg);
  }
  .checkbox.checked{
    background:var(--soon);
    border-color:var(--soon);
  }
  .task-body{ flex:1; min-width:0; }
  .task-title{
    font-size:19px;
    font-weight:500;
    margin:0 0 9px;
    word-break:break-word;
  }
  .task.done .task-title{ text-decoration:line-through; }
  .task-meta{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    align-items:center;
  }
  .tag{
    font-size:11px;
    letter-spacing:0.04em;
    text-transform:uppercase;
    font-weight:600;
    padding:4px 10px;
    border-radius:7px;
    color:#1B1F3B;
  }
  .due{
    font-size:13px;
    color:var(--muted);
  }
  .task-actions{
    display:flex;
    gap:10px;
    flex-shrink:0;
  }
  .icon-btn{
    background:none;
    border:none;
    color:var(--muted-dim);
    cursor:pointer;
    font-size:17px;
    padding:2px;
  }
  .icon-btn:hover{ color:var(--text); }
  .expand{
    max-height:0;
    overflow:hidden;
    transition:max-height .25s ease;
  }
  .expand.open{ max-height:220px; margin-top:16px; }
  .expand-inner{
    padding-top:16px;
    border-top:1px solid var(--card-edge);
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .expand-inner textarea{
    background:var(--field);
    border:1px solid var(--card-edge);
    border-radius:10px;
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:15px;
    padding:12px 14px;
    resize:none;
    min-height:64px;
    outline:none;
  }
  .time-row{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:14px;
    color:var(--muted);
  }
  .time-row input{
    width:70px;
    background:var(--field);
    border:1px solid var(--card-edge);
    border-radius:8px;
    color:var(--text);
    padding:6px 8px;
    font-size:14px;
    text-align:center;
    outline:none;
  }
  .empty{
    text-align:center;
    color:var(--muted-dim);
    font-size:15px;
    padding:40px 0;
  }
</style>
</head>
<body>

<div class="widget">
  <div class="header">
    <h1>This Week</h1>
    <span class="count" id="taskCount">0 tasks</span>
  </div>

  <div class="add-row">
    <input type="text" id="newTaskInput" placeholder="Add a task…">
    <select id="newTaskCategory">
      <option value="academic">Academic</option>
      <option value="personal">Personal</option>
      <option value="errand">Errand</option>
      <option value="health">Health</option>
    </select>
    <input type="date" id="newTaskDate">
    <button class="add-btn" id="addBtn">+</button>
  </div>

  <div class="filters" id="filters">
    <div class="filter-chip active" data-cat="all">All</div>
    <div class="filter-chip" data-cat="academic">Academic</div>
    <div class="filter-chip" data-cat="personal">Personal</div>
    <div class="filter-chip" data-cat="errand">Errand</div>
    <div class="filter-chip" data-cat="health">Health</div>
  </div>

  <div class="task-list" id="taskList"></div>
</div>

<script>
  const STORAGE_KEY = 'smartTaskListWidget';
  const catColors = { academic:'var(--cat-academic)', personal:'var(--cat-personal)', errand:'var(--cat-errand)', health:'var(--cat-health)' };
  const catColorHex = { academic:'#C87FA0', personal:'#6C9BC4', errand:'#8FBF8F', health:'#E8A468' };

  let state = load();
  let activeFilter = 'all';

  function load(){
    try{
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if(Array.isArray(saved)) return saved;
    }catch(e){}
    const today = new Date().toISOString().slice(0,10);
    const in3 = new Date(); in3.setDate(in3.getDate()+3);
    return [
      { id:1, title:'Finish literature review draft', category:'academic', date: in3.toISOString().slice(0,10), done:false, notes:'', estMin:90, actualMin:'', expanded:false },
      { id:2, title:'Buy groceries', category:'errand', date: today, done:false, notes:'', estMin:20, actualMin:'', expanded:false },
      { id:3, title:'Gym — leg day', category:'health', date: today, done:true, notes:'Felt strong, upped squat weight', estMin:60, actualMin:65, expanded:false },
    ];
  }
  function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

  function urgencyClass(dateStr, done){
    if(done) return '';
    const days = Math.ceil((new Date(dateStr) - new Date(new Date().toDateString())) / 86400000);
    if(days <= 1) return 'urgent';
    if(days <= 3) return 'soon';
    return '';
  }

  function render(){
    const list = document.getElementById('taskList');
    const filtered = state.filter(t => activeFilter==='all' || t.category===activeFilter);
    document.getElementById('taskCount').textContent = `${state.filter(t=>!t.done).length} open · ${state.length} total`;

    if(filtered.length === 0){
      list.innerHTML = '<div class="empty">No tasks here yet.</div>';
      return;
    }

    list.innerHTML = filtered.map(t => {
      const uClass = urgencyClass(t.date, t.done);
      const dateLabel = t.date ? new Date(t.date+'T00:00:00').toLocaleDateString('en-US',{month:'short', day:'numeric'}) : '';
      return `
      <div class="task ${uClass} ${t.done?'done':''}" data-id="${t.id}">
        <div class="task-top">
          <div class="checkbox ${t.done?'checked':''}" data-action="toggle">${t.done?'✓':''}</div>
          <div class="task-body">
            <p class="task-title">${escapeHtml(t.title)}</p>
            <div class="task-meta">
              <span class="tag" style="background:${catColorHex[t.category]}">${t.category}</span>
              ${dateLabel ? `<span class="due">${dateLabel}</span>` : ''}
              ${t.actualMin ? `<span class="due">⏱ ${t.actualMin}m (est ${t.estMin}m)</span>` : `<span class="due">⏱ est ${t.estMin}m</span>`}
            </div>
          </div>
          <div class="task-actions">
            <button class="icon-btn" data-action="expand">✎</button>
            <button class="icon-btn" data-action="delete">✕</button>
          </div>
        </div>
        <div class="expand ${t.expanded?'open':''}">
          <div class="expand-inner">
            <textarea placeholder="Notes — how'd you approach it?" data-action="notes">${escapeHtml(t.notes||'')}</textarea>
            <div class="time-row">
              Actual time: <input type="number" data-action="actual" value="${t.actualMin||''}" placeholder="min"> min
            </div>
          </div>
        </div>
      </div>`;
    }).join('');

    // bind events
    list.querySelectorAll('.task').forEach(el=>{
      const id = Number(el.dataset.id);
      const task = state.find(t=>t.id===id);
      el.querySelector('[data-action="toggle"]').addEventListener('click', ()=>{
        task.done = !task.done; save(); render();
      });
      el.querySelector('[data-action="delete"]').addEventListener('click', ()=>{
        state = state.filter(t=>t.id!==id); save(); render();
      });
      el.querySelector('[data-action="expand"]').addEventListener('click', ()=>{
        task.expanded = !task.expanded; render();
      });
      const notesEl = el.querySelector('[data-action="notes"]');
      if(notesEl){
        notesEl.addEventListener('blur', ()=>{ task.notes = notesEl.value; save(); });
      }
      const actualEl = el.querySelector('[data-action="actual"]');
      if(actualEl){
        actualEl.addEventListener('blur', ()=>{ task.actualMin = actualEl.value; save(); render(); });
      }
    });
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  document.getElementById('addBtn').addEventListener('click', addTask);
  document.getElementById('newTaskInput').addEventListener('keydown', e=>{
    if(e.key==='Enter') addTask();
  });
  function addTask(){
    const input = document.getElementById('newTaskInput');
    const title = input.value.trim();
    if(!title) return;
    const category = document.getElementById('newTaskCategory').value;
    const date = document.getElementById('newTaskDate').value || new Date().toISOString().slice(0,10);
    state.push({ id: Date.now(), title, category, date, done:false, notes:'', estMin:30, actualMin:'', expanded:false });
    input.value = '';
    save(); render();
  }

  document.getElementById('filters').addEventListener('click', e=>{
    const chip = e.target.closest('.filter-chip');
    if(!chip) return;
    document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = chip.dataset.cat;
    render();
  });

  render();
</script>

</body>
</html>
