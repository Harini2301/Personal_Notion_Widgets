<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Task List</title>
<style>
  :root{
    --text:#37352f;
    --text-muted:#787774;
    --text-faint:#9b9a97;
    --line:rgba(55,53,47,0.12);
    --hover:rgba(55,53,47,0.06);
    --field:rgba(55,53,47,0.055);
    --accent:#d9730d;
    --urgent:#eb5757;
    --soon:#d9730d;
    --safe:rgba(55,53,47,0.15);
    --cat-academic:#c87fa0;
    --cat-personal:#337ea9;
    --cat-errand:#4d8a4d;
    --cat-health:#d9730d;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --text:#e9e9e7;
      --text-muted:#9b9b9b;
      --text-faint:#767676;
      --line:rgba(255,255,255,0.13);
      --hover:rgba(255,255,255,0.07);
      --field:rgba(255,255,255,0.065);
      --accent:#e0a032;
      --urgent:#ff6369;
      --soon:#e0a032;
      --safe:rgba(255,255,255,0.15);
      --cat-academic:#e0a0bd;
      --cat-personal:#5fb3e0;
      --cat-errand:#7fbf7f;
      --cat-health:#e0a032;
    }
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0;
    background:transparent;
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    font-size:14px;
  }
  .widget{
    width:100%;
    padding:4px 2px 8px;
  }
  .header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:14px;
  }
  .header h1{
    font-weight:600;
    font-size:19px;
    margin:0;
  }
  .header .count{
    font-size:12.5px;
    color:var(--text-faint);
  }
  .add-row{
    display:flex;
    gap:8px;
    margin-bottom:14px;
    flex-wrap:wrap;
  }
  .add-row input[type="text"]{
    flex:1;
    min-width:140px;
    background:var(--field);
    border:1px solid var(--line);
    border-radius:6px;
    padding:9px 12px;
    color:var(--text);
    font-family:inherit;
    font-size:14px;
    outline:none;
  }
  .add-row input[type="text"]::placeholder{ color:var(--text-faint); }
  .add-row input[type="text"]:focus{ border-color:var(--text-faint); }
  select, .add-row input[type="date"]{
    background:var(--field);
    border:1px solid var(--line);
    border-radius:6px;
    color:var(--text-muted);
    font-family:inherit;
    font-size:13px;
    padding:0 10px;
    outline:none;
    height:38px;
  }
  .add-btn{
    background:var(--accent);
    border:none;
    border-radius:6px;
    width:38px;
    height:38px;
    color:#fff;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
  }
  .add-btn:hover{ opacity:0.9; }
  .filters{
    display:flex;
    gap:6px;
    margin-bottom:14px;
    flex-wrap:wrap;
  }
  .filter-chip{
    font-size:11.5px;
    padding:5px 12px;
    border-radius:14px;
    border:1px solid var(--line);
    color:var(--text-muted);
    cursor:pointer;
    font-weight:500;
    user-select:none;
    background:var(--field);
  }
  .filter-chip:hover{ background:var(--hover); }
  .filter-chip.active{
    background:rgba(217,115,13,0.13);
    color:var(--accent);
    border-color:transparent;
  }
  .task-list{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .task{
    background:var(--field);
    border:1px solid var(--line);
    border-left:3px solid var(--safe);
    border-radius:6px;
    padding:12px 14px;
    transition:opacity .2s ease, background-color .12s ease;
  }
  .task:hover{ background:var(--hover); }
  .task.urgent{ border-left-color:var(--urgent); }
  .task.soon{ border-left-color:var(--soon); }
  .task.done{ opacity:0.5; }
  .task-top{
    display:flex;
    align-items:flex-start;
    gap:12px;
  }
  .checkbox{
    width:18px; height:18px;
    border-radius:5px;
    border:1.5px solid var(--text-faint);
    flex-shrink:0;
    margin-top:2px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:11px;
    color:#fff;
    background:var(--field);
  }
  .checkbox.checked{
    background:var(--accent);
    border-color:var(--accent);
  }
  .task-body{ flex:1; min-width:0; }
  .task-title{
    font-size:14px;
    font-weight:500;
    margin:0 0 6px;
    word-break:break-word;
  }
  .task.done .task-title{ text-decoration:line-through; color:var(--text-faint); }
  .task-meta{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
  }
  .tag{
    font-size:10px;
    letter-spacing:0.02em;
    font-weight:600;
    padding:2px 8px;
    border-radius:5px;
    color:#fff;
  }
  .due{
    font-size:12px;
    color:var(--text-faint);
  }
  .task-actions{
    display:flex;
    gap:6px;
    flex-shrink:0;
  }
  .icon-btn{
    background:none;
    border:none;
    color:var(--text-faint);
    cursor:pointer;
    font-size:14px;
    padding:3px;
    border-radius:4px;
  }
  .icon-btn:hover{ color:var(--text); background:var(--hover); }
  .expand{
    max-height:0;
    overflow:hidden;
    transition:max-height .25s ease;
  }
  .expand.open{ max-height:220px; margin-top:12px; }
  .expand-inner{
    padding-top:12px;
    border-top:1px solid var(--line);
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .expand-inner textarea{
    background:var(--field);
    border:1px solid var(--line);
    border-radius:5px;
    color:var(--text);
    font-family:inherit;
    font-size:13.5px;
    padding:9px 10px;
    resize:none;
    min-height:56px;
    outline:none;
  }
  .expand-inner textarea:focus{ border-color:var(--text-faint); }
  .time-row{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    color:var(--text-muted);
  }
  .time-row input{
    width:56px;
    background:var(--field);
    border:1px solid var(--line);
    border-radius:5px;
    color:var(--text);
    padding:5px 7px;
    font-size:13px;
    text-align:center;
    outline:none;
  }
  .empty{
    text-align:center;
    color:var(--text-faint);
    font-size:13.5px;
    padding:26px 0;
  }
</style>
</head>
<body>

<div class="widget">
  <div class="header">
    <h1>This Week</h1>
    <span class="count" id="taskCount">0 tasks</span>
  </div>

  <div class="add-row">
    <input type="text" id="newTaskInput" placeholder="Add a task…">
    <select id="newTaskCategory">
      <option value="academic">Academic</option>
      <option value="personal">Personal</option>
      <option value="errand">Errand</option>
      <option value="health">Health</option>
    </select>
    <input type="date" id="newTaskDate">
    <button class="add-btn" id="addBtn">+</button>
  </div>

  <div class="filters" id="filters">
    <div class="filter-chip active" data-cat="all">All</div>
    <div class="filter-chip" data-cat="academic">Academic</div>
    <div class="filter-chip" data-cat="personal">Personal</div>
    <div class="filter-chip" data-cat="errand">Errand</div>
    <div class="filter-chip" data-cat="health">Health</div>
  </div>

  <div class="task-list" id="taskList"></div>
</div>

<script>
  const STORAGE_KEY = 'smartTaskListWidget';
  const catColorHex = { academic:'var(--cat-academic)', personal:'var(--cat-personal)', errand:'var(--cat-errand)', health:'var(--cat-health)' };

  let state = load();
  let activeFilter = 'all';

  function load(){
    try{
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if(Array.isArray(saved)) return saved;
    }catch(e){}
    const today = new Date().toISOString().slice(0,10);
    const in3 = new Date(); in3.setDate(in3.getDate()+3);
    return [
      { id:1, title:'Finish literature review draft', category:'academic', date: in3.toISOString().slice(0,10), done:false, notes:'', estMin:90, actualMin:'', expanded:false },
      { id:2, title:'Buy groceries', category:'errand', date: today, done:false, notes:'', estMin:20, actualMin:'', expanded:false },
      { id:3, title:'Gym — leg day', category:'health', date: today, done:true, notes:'Felt strong, upped squat weight', estMin:60, actualMin:65, expanded:false },
    ];
  }
  function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

  function urgencyClass(dateStr, done){
    if(done) return '';
    const days = Math.ceil((new Date(dateStr) - new Date(new Date().toDateString())) / 86400000);
    if(days <= 1) return 'urgent';
    if(days <= 3) return 'soon';
    return '';
  }

  function render(){
    const list = document.getElementById('taskList');
    const filtered = state.filter(t => activeFilter==='all' || t.category===activeFilter);
    document.getElementById('taskCount').textContent = `${state.filter(t=>!t.done).length} open · ${state.length} total`;

    if(filtered.length === 0){
      list.innerHTML = '<div class="empty">No tasks here yet.</div>';
      return;
    }

    list.innerHTML = filtered.map(t => {
      const uClass = urgencyClass(t.date, t.done);
      const dateLabel = t.date ? new Date(t.date+'T00:00:00').toLocaleDateString('en-US',{month:'short', day:'numeric'}) : '';
      return `
      <div class="task ${uClass} ${t.done?'done':''}" data-id="${t.id}">
        <div class="task-top">
          <div class="checkbox ${t.done?'checked':''}" data-action="toggle">${t.done?'✓':''}</div>
          <div class="task-body">
            <p class="task-title">${escapeHtml(t.title)}</p>
            <div class="task-meta">
              <span class="tag" style="background:${catColorHex[t.category]}">${t.category}</span>
              ${dateLabel ? `<span class="due">${dateLabel}</span>` : ''}
              ${t.actualMin ? `<span class="due">⏱ ${t.actualMin}m (est ${t.estMin}m)</span>` : `<span class="due">⏱ est ${t.estMin}m</span>`}
            </div>
          </div>
          <div class="task-actions">
            <button class="icon-btn" data-action="expand">✎</button>
            <button class="icon-btn" data-action="delete">✕</button>
          </div>
        </div>
        <div class="expand ${t.expanded?'open':''}">
          <div class="expand-inner">
            <textarea placeholder="Notes — how'd you approach it?" data-action="notes">${escapeHtml(t.notes||'')}</textarea>
            <div class="time-row">
              Actual time: <input type="number" data-action="actual" value="${t.actualMin||''}" placeholder="min"> min
            </div>
          </div>
        </div>
      </div>`;
    }).join('');

    // bind events
    list.querySelectorAll('.task').forEach(el=>{
      const id = Number(el.dataset.id);
      const task = state.find(t=>t.id===id);
      el.querySelector('[data-action="toggle"]').addEventListener('click', ()=>{
        task.done = !task.done; save(); render();
      });
      el.querySelector('[data-action="delete"]').addEventListener('click', ()=>{
        state = state.filter(t=>t.id!==id); save(); render();
      });
      el.querySelector('[data-action="expand"]').addEventListener('click', ()=>{
        task.expanded = !task.expanded; render();
      });
      const notesEl = el.querySelector('[data-action="notes"]');
      if(notesEl){
        notesEl.addEventListener('blur', ()=>{ task.notes = notesEl.value; save(); });
      }
      const actualEl = el.querySelector('[data-action="actual"]');
      if(actualEl){
        actualEl.addEventListener('blur', ()=>{ task.actualMin = actualEl.value; save(); render(); });
      }
    });
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  document.getElementById('addBtn').addEventListener('click', addTask);
  document.getElementById('newTaskInput').addEventListener('keydown', e=>{
    if(e.key==='Enter') addTask();
  });
  function addTask(){
    const input = document.getElementById('newTaskInput');
    const title = input.value.trim();
    if(!title) return;
    const category = document.getElementById('newTaskCategory').value;
    const date = document.getElementById('newTaskDate').value || new Date().toISOString().slice(0,10);
    state.push({ id: Date.now(), title, category, date, done:false, notes:'', estMin:30, actualMin:'', expanded:false });
    input.value = '';
    save(); render();
  }

  document.getElementById('filters').addEventListener('click', e=>{
    const chip = e.target.closest('.filter-chip');
    if(!chip) return;
    document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = chip.dataset.cat;
    render();
  });

  render();
</script>

</body>
</html>
