<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Timer</title>
<style>
  :root{
    --text:#37352f;
    --text-muted:#787774;
    --text-faint:#9b9a97;
    --line:rgba(55,53,47,0.12);
    --hover:rgba(55,53,47,0.06);
    --field:rgba(55,53,47,0.055);
    --accent:#d9730d;
    --accent-soft:rgba(217,115,13,0.13);
    --ring-track:rgba(55,53,47,0.1);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --text:#e9e9e7;
      --text-muted:#9b9b9b;
      --text-faint:#767676;
      --line:rgba(255,255,255,0.13);
      --hover:rgba(255,255,255,0.07);
      --field:rgba(255,255,255,0.065);
      --accent:#e0a032;
      --accent-soft:rgba(224,160,50,0.16);
      --ring-track:rgba(255,255,255,0.1);
    }
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0;
    background:transparent;
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    font-size:14px;
  }
  .widget{
    width:100%;
    padding:8px 2px 4px;
  }
  .card{
    width:100%;
    text-align:center;
  }
  /* ---- Timer view ---- */
  .eyebrow{
    font-size:11.5px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--text-faint);
    font-weight:600;
    margin-bottom:16px;
  }
  .ring-wrap{
    position:relative;
    width:170px;
    height:170px;
    margin:0 auto 20px;
  }
  svg{ transform:rotate(-90deg); }
  .ring-bg{ stroke:var(--ring-track); }
  .ring-progress{
    stroke:var(--accent);
    stroke-linecap:round;
    transition:stroke-dashoffset 1s linear;
  }
  .ring-center{
    position:absolute;
    top:0; left:0; right:0; bottom:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }
  .time-display{
    font-weight:600;
    font-size:34px;
    letter-spacing:-0.01em;
  }
  .time-sub{
    font-size:10.5px;
    color:var(--text-faint);
    text-transform:uppercase;
    letter-spacing:0.04em;
    margin-top:3px;
  }
  .tags{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:6px;
    margin-bottom:18px;
  }
  .tag-chip{
    font-size:12px;
    padding:6px 12px;
    border-radius:14px;
    border:1px solid var(--line);
    color:var(--text-muted);
    cursor:pointer;
    font-weight:500;
    background:var(--field);
    user-select:none;
    transition:all .12s ease;
  }
  .tag-chip:hover{ background:var(--hover); }
  .tag-chip.active{
    background:var(--accent-soft);
    color:var(--accent);
    border-color:transparent;
    font-weight:600;
  }
  .controls{
    display:flex;
    justify-content:center;
    gap:8px;
    margin-bottom:14px;
  }
  .btn{
    font-family:inherit;
    font-size:13.5px;
    font-weight:600;
    padding:9px 22px;
    border-radius:6px;
    border:1px solid transparent;
    cursor:pointer;
  }
  .btn-primary{
    background:var(--accent);
    color:#fff;
  }
  .btn-primary:hover{ opacity:0.9; }
  .btn-secondary{
    background:var(--field);
    color:var(--text-muted);
    border:1px solid var(--line);
  }
  .btn-secondary:hover{ color:var(--text); background:var(--hover); }
  .history-link{
    background:none;
    border:none;
    color:var(--text-faint);
    font-size:12.5px;
    cursor:pointer;
    font-family:inherit;
    padding:3px 6px;
    border-radius:4px;
  }
  .history-link:hover{ color:var(--text-muted); background:var(--hover); }
  /* ---- History view ---- */
  .history-view{ display:none; text-align:left; }
  .history-view.open{ display:block; }
  .timer-view.hidden{ display:none; }
  .history-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:4px;
  }
  .history-header h2{
    font-weight:600;
    font-size:16px;
    margin:0;
  }
  .back-btn{
    background:none;
    border:none;
    color:var(--text-faint);
    font-size:12.5px;
    cursor:pointer;
    font-family:inherit;
    padding:3px 6px;
    border-radius:4px;
  }
  .back-btn:hover{ color:var(--text-muted); background:var(--hover); }
  .today-total{
    font-size:12.5px;
    color:var(--text-muted);
    margin-bottom:14px;
  }
  .today-total span{ color:var(--accent); font-weight:600; }
  .session-list{
    display:flex;
    flex-direction:column;
    gap:6px;
    max-height:340px;
    overflow-y:auto;
  }
  .session-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--field);
    border:1px solid var(--line);
    border-radius:6px;
    padding:9px 11px;
  }
  .session-left{
    display:flex;
    align-items:center;
    gap:9px;
  }
  .session-tag{
    font-size:10px;
    letter-spacing:0.02em;
    text-transform:uppercase;
    font-weight:600;
    padding:3px 8px;
    border-radius:5px;
    background:var(--accent-soft);
    color:var(--accent);
  }
  .session-item.incomplete .session-tag{
    background:var(--hover);
    color:var(--text-faint);
  }
  .session-when{
    font-size:11.5px;
    color:var(--text-faint);
  }
  .session-dur{
    font-size:12.5px;
    font-weight:600;
    color:var(--text);
  }
  .session-item.incomplete .session-dur{ color:var(--text-muted); }
  .empty-history{
    text-align:center;
    color:var(--text-faint);
    font-size:13px;
    padding:30px 0;
  }
</style>
</head>
<body>
<div class="widget">
  <div class="card">
    <!-- TIMER VIEW -->
    <div class="timer-view" id="timerView">
      <div class="eyebrow" id="statusLabel">Ready to focus</div>
      <div class="ring-wrap">
        <svg width="170" height="170">
          <circle class="ring-bg" cx="85" cy="85" r="74" stroke-width="8" fill="none"/>
          <circle class="ring-progress" id="ringProgress" cx="85" cy="85" r="74" stroke-width="8" fill="none"
                  stroke-dasharray="464.9" stroke-dashoffset="0"/>
        </svg>
        <div class="ring-center">
          <div class="time-display" id="timeDisplay">25:00</div>
          <div class="time-sub" id="tagDisplay">no tag</div>
        </div>
      </div>
      <div class="tags" id="tagPicker">
        <div class="tag-chip active" data-tag="none">No tag</div>
        <div class="tag-chip" data-tag="academic">Academic</div>
        <div class="tag-chip" data-tag="personal">Personal</div>
        <div class="tag-chip" data-tag="reading">Reading</div>
        <div class="tag-chip" data-tag="work">Work</div>
      </div>
      <div class="controls">
        <button class="btn btn-primary" id="startBtn">Start</button>
        <button class="btn btn-secondary" id="resetBtn">Reset</button>
      </div>
      <button class="history-link" id="openHistory">View history →</button>
    </div>
    <!-- HISTORY VIEW -->
    <div class="history-view" id="historyView">
      <div class="history-header">
        <h2>History</h2>
        <button class="back-btn" id="closeHistory">← back</button>
      </div>
      <div class="today-total" id="todayTotal">0 min focused today</div>
      <div class="session-list" id="sessionList"></div>
    </div>
  </div>
</div>
<script>
  const STORAGE_KEY = 'focusTimerWidget';
  const SESSION_LENGTH = 25 * 60; // 25 min in seconds
  const CIRCUMFERENCE = 2 * Math.PI * 74;
  let timeLeft = SESSION_LENGTH;
  let running = false;
  let intervalId = null;
  let activeTag = 'none';
  let sessionStart = null;
  const timeDisplay = document.getElementById('timeDisplay');
  const tagDisplay = document.getElementById('tagDisplay');
  const statusLabel = document.getElementById('statusLabel');
  const ringProgress = document.getElementById('ringProgress');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');
  document.getElementById('ringProgress').setAttribute('stroke-dasharray', CIRCUMFERENCE);
  function loadSessions(){
    try{
      const s = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if(Array.isArray(s)) return s;
    }catch(e){}
    return [];
  }
  function saveSessions(sessions){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
  }
  function formatTime(sec){
    const m = Math.floor(sec/60).toString().padStart(2,'0');
    const s = (sec%60).toString().padStart(2,'0');
    return `${m}:${s}`;
  }
  function updateDisplay(){
    timeDisplay.textContent = formatTime(timeLeft);
    const offset = CIRCUMFERENCE * (timeLeft / SESSION_LENGTH);
    ringProgress.style.strokeDashoffset = CIRCUMFERENCE - offset;
    tagDisplay.textContent = activeTag === 'none' ? 'no tag' : activeTag;
  }
  document.getElementById('tagPicker').addEventListener('click', e=>{
    const chip = e.target.closest('.tag-chip');
    if(!chip || running) return; // lock tag once running
    document.querySelectorAll('.tag-chip').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    activeTag = chip.dataset.tag;
    updateDisplay();
  });
  function logSession(completed){
    const sessions = loadSessions();
    const durationMin = completed
      ? Math.round(SESSION_LENGTH/60)
      : Math.round((SESSION_LENGTH - timeLeft)/60);
    if(durationMin < 1) return; // don't log near-zero attempts
    sessions.unshift({
      tag: activeTag,
      minutes: durationMin,
      completed: completed,
      timestamp: new Date().toISOString()
    });
    saveSessions(sessions);
  }
  function startTimer(){
    running = true;
    statusLabel.textContent = 'Focusing…';
    startBtn.textContent = 'Pause';
    intervalId = setInterval(()=>{
      timeLeft--;
      updateDisplay();
      if(timeLeft <= 0){
        clearInterval(intervalId);
        running = false;
        logSession(true);
        statusLabel.textContent = 'Session complete 🎉';
        startBtn.textContent = 'Start';
        timeLeft = SESSION_LENGTH;
        setTimeout(updateDisplay, 50);
      }
    }, 1000);
  }
  function pauseTimer(){
    running = false;
    clearInterval(intervalId);
    statusLabel.textContent = 'Paused';
    startBtn.textContent = 'Resume';
  }
  startBtn.addEventListener('click', ()=>{
    if(!running){
      startTimer();
    } else {
      pauseTimer();
    }
  });
  resetBtn.addEventListener('click', ()=>{
    const wasRunning = running || (timeLeft < SESSION_LENGTH);
    if(wasRunning && timeLeft < SESSION_LENGTH){
      logSession(false); // log partial/abandoned session
    }
    clearInterval(intervalId);
    running = false;
    timeLeft = SESSION_LENGTH;
    statusLabel.textContent = 'Ready to focus';
    startBtn.textContent = 'Start';
    updateDisplay();
  });
  // ---- History view ----
  const timerView = document.getElementById('timerView');
  const historyView = document.getElementById('historyView');
  document.getElementById('openHistory').addEventListener('click', ()=>{
    timerView.classList.add('hidden');
    historyView.classList.add('open');
    renderHistory();
  });
  document.getElementById('closeHistory').addEventListener('click', ()=>{
    historyView.classList.remove('open');
    timerView.classList.remove('hidden');
  });
  function renderHistory(){
    const sessions = loadSessions();
    const list = document.getElementById('sessionList');
    const todayStr = new Date().toDateString();
    const todayMinutes = sessions
      .filter(s => new Date(s.timestamp).toDateString() === todayStr)
      .reduce((sum,s)=>sum + s.minutes, 0);
    document.getElementById('todayTotal').innerHTML = `<span>${todayMinutes} min</span> focused today`;
    if(sessions.length === 0){
      list.innerHTML = '<div class="empty-history">No sessions logged yet — finish a focus session to see it here.</div>';
      return;
    }
    list.innerHTML = sessions.map(s=>{
      const d = new Date(s.timestamp);
      const isToday = d.toDateString() === todayStr;
      const dateLabel = isToday
        ? d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})
        : d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ', ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
      return `
        <div class="session-item ${s.completed ? '' : 'incomplete'}">
          <div class="session-left">
            <span class="session-tag">${s.tag === 'none' ? 'untagged' : s.tag}</span>
            <span class="session-when">${dateLabel}</span>
          </div>
          <span class="session-dur">${s.minutes}m${s.completed ? '' : ' (stopped early)'}</span>
        </div>
      `;
    }).join('');
  }
  updateDisplay();
</script>
</body>
</html>
