<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>
<style>
  :root{
    --text:#37352f;
    --text-muted:#787774;
    --text-faint:#9b9a97;
    --line:rgba(55,53,47,0.12);
    --hover:rgba(55,53,47,0.06);
    --field:rgba(55,53,47,0.05);
    --accent:#d9730d;
    --accent-soft:rgba(217,115,13,0.13);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --text:#e9e9e7;
      --text-muted:#9b9b9b;
      --text-faint:#767676;
      --line:rgba(255,255,255,0.13);
      --hover:rgba(255,255,255,0.07);
      --field:rgba(255,255,255,0.06);
      --accent:#e0a032;
      --accent-soft:rgba(224,160,50,0.16);
    }
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0;
    background:transparent;
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    font-size:14px;
  }
  .widget{
    width:100%;
    padding:4px 2px 8px;
  }
  .header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:3px;
  }
  .header h1{
    font-weight:600;
    font-size:17px;
    margin:0;
  }
  .week-range{
    font-size:11.5px;
    color:var(--text-faint);
  }
  .subtext{
    font-size:12px;
    color:var(--text-faint);
    margin-bottom:14px;
  }

  .grid-wrap{ overflow-x:auto; }
  .grid{
    display:grid;
    grid-template-columns: 150px repeat(7, 1fr) 32px;
    gap:3px;
    min-width:560px;
  }
  .corner{ }
  .day-head{
    text-align:center;
    padding:2px 0 8px;
  }
  .day-name{
    font-size:10.5px;
    letter-spacing:0.03em;
    text-transform:uppercase;
    color:var(--text-faint);
    font-weight:600;
  }
  .day-date{
    font-size:13.5px;
    font-weight:600;
    margin-top:2px;
    color:var(--text-muted);
  }
  .day-head.today .day-date{
    color:var(--accent);
  }
  .day-head.today .day-name{
    color:var(--accent);
  }

  .habit-row-name{
    display:flex;
    align-items:center;
    border-bottom:1px solid var(--line);
    padding:0 8px;
    font-size:13px;
    font-weight:500;
    min-height:38px;
  }
  .habit-row-name input{
    background:none;
    border:none;
    color:var(--text);
    font-family:inherit;
    font-size:13px;
    font-weight:500;
    outline:none;
    width:100%;
  }

  .cell{
    background:var(--field);
    border-radius:5px;
    min-height:38px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:background .12s ease;
  }
  .cell:hover{ background:var(--hover); }
  .cell .mark{
    width:16px; height:16px;
    border-radius:4px;
    border:1.5px solid var(--text-faint);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:10px;
    color:#fff;
    background:transparent;
  }
  .cell.checked .mark{
    background:var(--accent);
    border-color:var(--accent);
  }

  .remove-btn{
    background:none;
    border:none;
    color:var(--text-faint);
    font-size:13px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    border-bottom:1px solid var(--line);
  }
  .remove-btn:hover{ color:var(--text-muted); }

  .add-row{
    display:flex;
    gap:8px;
    margin-top:14px;
  }
  .add-row input{
    flex:1;
    max-width:240px;
    background:var(--field);
    border:1px solid var(--line);
    border-radius:6px;
    padding:8px 12px;
    color:var(--text);
    font-family:inherit;
    font-size:13px;
    outline:none;
  }
  .add-row input:focus{ border-color:var(--text-faint); }
  .add-row input::placeholder{ color:var(--text-faint); }
  .add-btn{
    background:var(--accent);
    border:none;
    border-radius:6px;
    padding:0 16px;
    color:#fff;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
  }
  .add-btn:hover{ opacity:0.9; }

  .empty{
    color:var(--text-faint);
    font-size:13px;
    padding:16px 0;
    text-align:center;
  }
</style>
</head>
<body>

<div class="widget">
  <div class="header">
    <h1>Habits</h1>
    <span class="week-range" id="weekRange"></span>
  </div>
  <div class="subtext">Resets every Monday</div>

  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>

  <div class="add-row">
    <input type="text" id="newHabitInput" placeholder="Add a habit…">
    <button class="add-btn" id="addHabitBtn">Add</button>
  </div>
</div>

<script>
  const STORAGE_KEY = 'habitTrackerWidget';
  const DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  function getMonday(d){
    const date = new Date(d);
    const day = date.getDay(); // 0=Sun..6=Sat
    const diff = (day === 0 ? -6 : 1) - day;
    date.setDate(date.getDate() + diff);
    date.setHours(0,0,0,0);
    return date;
  }

  function weekKey(mondayDate){
    return mondayDate.toISOString().slice(0,10);
  }

  function load(){
    try{
      const s = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if(s && Array.isArray(s.habits)) return s;
    }catch(e){}
    return {
      habits: ['Read 20 min', 'Sleep before midnight', 'Review notes'],
      weeks: {}
    };
  }
  function save(state){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

  let state = load();
  const monday = getMonday(new Date());
  const wKey = weekKey(monday);
  if(!state.weeks[wKey]) state.weeks[wKey] = {};

  function getWeekDates(monday){
    const dates = [];
    for(let i=0;i<7;i++){
      const d = new Date(monday);
      d.setDate(d.getDate()+i);
      dates.push(d);
    }
    return dates;
  }
  const weekDates = getWeekDates(monday);

  function formatRange(dates){
    const opts = {month:'short', day:'numeric'};
    return `${dates[0].toLocaleDateString('en-US',opts)} – ${dates[6].toLocaleDateString('en-US',opts)}`;
  }
  document.getElementById('weekRange').textContent = formatRange(weekDates);

  function isToday(d){
    const t = new Date();
    return d.toDateString() === t.toDateString();
  }

  function render(){
    const grid = document.getElementById('grid');
    let html = '<div class="corner"></div>';
    weekDates.forEach((d,i)=>{
      html += `<div class="day-head ${isToday(d)?'today':''}">
        <div class="day-name">${DAY_NAMES[i]}</div>
        <div class="day-date">${d.getDate()}</div>
      </div>`;
    });
    html += '<div class="corner"></div>';

    if(state.habits.length === 0){
      grid.innerHTML = html;
      grid.insertAdjacentHTML('beforeend', '');
      const wrap = document.getElementById('grid');
      wrap.style.gridTemplateColumns = '1fr';
      wrap.innerHTML = '<div class="empty">No habits yet — add one below.</div>';
      return;
    }
    document.getElementById('grid').style.gridTemplateColumns = '150px repeat(7, 1fr) 32px';

    state.habits.forEach((habit, hIdx)=>{
      html += `<div class="habit-row-name">
        <input type="text" value="${escapeHtml(habit)}" data-idx="${hIdx}" data-action="rename">
      </div>`;
      for(let d=0; d<7; d++){
        const checked = !!(state.weeks[wKey][hIdx] && state.weeks[wKey][hIdx][d]);
        html += `<div class="cell ${checked?'checked':''}" data-habit="${hIdx}" data-day="${d}">
          <div class="mark">${checked?'✓':''}</div>
        </div>`;
      }
      html += `<button class="remove-btn" data-remove="${hIdx}">✕</button>`;
    });

    grid.innerHTML = html;
    bindEvents();
  }

  function bindEvents(){
    document.querySelectorAll('.cell').forEach(cell=>{
      cell.addEventListener('click', ()=>{
        const h = cell.dataset.habit;
        const d = cell.dataset.day;
        if(!state.weeks[wKey][h]) state.weeks[wKey][h] = {};
        state.weeks[wKey][h][d] = !state.weeks[wKey][h][d];
        save(state);
        render();
      });
    });
    document.querySelectorAll('[data-remove]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const idx = Number(btn.dataset.remove);
        state.habits.splice(idx,1);
        // reindex week data
        Object.keys(state.weeks).forEach(wk=>{
          const newWeek = {};
          Object.keys(state.weeks[wk]).forEach(k=>{
            const ki = Number(k);
            if(ki < idx) newWeek[ki] = state.weeks[wk][k];
            else if(ki > idx) newWeek[ki-1] = state.weeks[wk][k];
          });
          state.weeks[wk] = newWeek;
        });
        save(state);
        render();
      });
    });
    document.querySelectorAll('[data-action="rename"]').forEach(inp=>{
      inp.addEventListener('blur', ()=>{
        const idx = Number(inp.dataset.idx);
        state.habits[idx] = inp.value.trim() || state.habits[idx];
        save(state);
      });
    });
  }

  document.getElementById('addHabitBtn').addEventListener('click', addHabit);
  document.getElementById('newHabitInput').addEventListener('keydown', e=>{
    if(e.key==='Enter') addHabit();
  });
  function addHabit(){
    const input = document.getElementById('newHabitInput');
    const val = input.value.trim();
    if(!val) return;
    state.habits.push(val);
    save(state);
    input.value = '';
    render();
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  render();
</script>

</body>
</html>
