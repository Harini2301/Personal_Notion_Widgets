<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1B1F3B;
    --card:#242952;
    --card-edge:#2F356B;
    --field:#1F2447;
    --text:#F1EEE5;
    --muted:#9098C4;
    --muted-dim:#6870A0;
    --accent:#E8C468;
    --today-ring:#E8734A;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0;
    background:var(--bg);
    font-family:'Inter',sans-serif;
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  .widget{
    width:100%;
    max-width:680px;
    margin:0 auto;
    padding:36px 30px 50px;
  }
  .header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:6px;
  }
  .header h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:28px;
    margin:0;
  }
  .week-range{
    font-size:12px;
    color:var(--muted);
    letter-spacing:0.03em;
  }
  .subtext{
    font-size:12px;
    color:var(--muted-dim);
    margin-bottom:24px;
  }

  .grid-wrap{ overflow-x:auto; }
  .grid{
    display:grid;
    grid-template-columns: 160px repeat(7, 1fr) 40px;
    gap:6px;
    min-width:600px;
  }
  .corner{ }
  .day-head{
    text-align:center;
    padding:4px 0 10px;
  }
  .day-name{
    font-size:11px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--muted);
    font-weight:600;
  }
  .day-date{
    font-size:15px;
    font-family:'Fraunces',serif;
    font-weight:600;
    margin-top:2px;
  }
  .day-head.today .day-date{
    color:var(--today-ring);
  }
  .day-head.today .day-name{
    color:var(--today-ring);
  }

  .habit-row-name{
    display:flex;
    align-items:center;
    background:var(--card);
    border:1px solid var(--card-edge);
    border-radius:10px;
    padding:0 12px;
    font-size:13px;
    font-weight:500;
    min-height:44px;
  }
  .habit-row-name input{
    background:none;
    border:none;
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:500;
    outline:none;
    width:100%;
  }

  .cell{
    background:var(--card);
    border:1px solid var(--card-edge);
    border-radius:10px;
    min-height:44px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:background .15s ease, border-color .15s ease;
  }
  .cell .mark{
    width:20px; height:20px;
    border-radius:6px;
    border:2px solid var(--muted-dim);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    color:var(--bg);
  }
  .cell.checked .mark{
    background:var(--accent);
    border-color:var(--accent);
  }
  .cell.checked{
    border-color:var(--accent);
  }

  .remove-btn{
    background:none;
    border:none;
    color:var(--muted-dim);
    font-size:15px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .remove-btn:hover{ color:var(--today-ring); }

  .add-row{
    display:flex;
    gap:10px;
    margin-top:18px;
  }
  .add-row input{
    flex:1;
    max-width:260px;
    background:var(--field);
    border:1px solid var(--card-edge);
    border-radius:10px;
    padding:11px 14px;
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:13px;
    outline:none;
  }
  .add-row input::placeholder{ color:var(--muted-dim); }
  .add-btn{
    background:var(--accent);
    border:none;
    border-radius:10px;
    padding:0 20px;
    color:var(--bg);
    font-size:13px;
    font-weight:700;
    cursor:pointer;
  }

  .empty{
    color:var(--muted-dim);
    font-size:13px;
    padding:20px 0;
    text-align:center;
  }
</style>
</head>
<body>

<div class="widget">
  <div class="header">
    <h1>Habits</h1>
    <span class="week-range" id="weekRange"></span>
  </div>
  <div class="subtext">Resets every Monday</div>

  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>

  <div class="add-row">
    <input type="text" id="newHabitInput" placeholder="Add a habit…">
    <button class="add-btn" id="addHabitBtn">Add</button>
  </div>
</div>

<script>
  const STORAGE_KEY = 'habitTrackerWidget';
  const DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  function getMonday(d){
    const date = new Date(d);
    const day = date.getDay(); // 0=Sun..6=Sat
    const diff = (day === 0 ? -6 : 1) - day;
    date.setDate(date.getDate() + diff);
    date.setHours(0,0,0,0);
    return date;
  }

  function weekKey(mondayDate){
    return mondayDate.toISOString().slice(0,10);
  }

  function load(){
    try{
      const s = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if(s && Array.isArray(s.habits)) return s;
    }catch(e){}
    return {
      habits: ['Read 20 min', 'Sleep before midnight', 'Review notes'],
      weeks: {}
    };
  }
  function save(state){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

  let state = load();
  const monday = getMonday(new Date());
  const wKey = weekKey(monday);
  if(!state.weeks[wKey]) state.weeks[wKey] = {};

  function getWeekDates(monday){
    const dates = [];
    for(let i=0;i<7;i++){
      const d = new Date(monday);
      d.setDate(d.getDate()+i);
      dates.push(d);
    }
    return dates;
  }
  const weekDates = getWeekDates(monday);

  function formatRange(dates){
    const opts = {month:'short', day:'numeric'};
    return `${dates[0].toLocaleDateString('en-US',opts)} – ${dates[6].toLocaleDateString('en-US',opts)}`;
  }
  document.getElementById('weekRange').textContent = formatRange(weekDates);

  function isToday(d){
    const t = new Date();
    return d.toDateString() === t.toDateString();
  }

  function render(){
    const grid = document.getElementById('grid');
    let html = '<div class="corner"></div>';
    weekDates.forEach((d,i)=>{
      html += `<div class="day-head ${isToday(d)?'today':''}">
        <div class="day-name">${DAY_NAMES[i]}</div>
        <div class="day-date">${d.getDate()}</div>
      </div>`;
    });
    html += '<div class="corner"></div>';

    if(state.habits.length === 0){
      grid.innerHTML = html;
      grid.insertAdjacentHTML('beforeend', '');
      const wrap = document.getElementById('grid');
      wrap.style.gridTemplateColumns = '1fr';
      wrap.innerHTML = '<div class="empty">No habits yet — add one below.</div>';
      return;
    }
    document.getElementById('grid').style.gridTemplateColumns = '160px repeat(7, 1fr) 40px';

    state.habits.forEach((habit, hIdx)=>{
      html += `<div class="habit-row-name">
        <input type="text" value="${escapeHtml(habit)}" data-idx="${hIdx}" data-action="rename">
      </div>`;
      for(let d=0; d<7; d++){
        const checked = !!(state.weeks[wKey][hIdx] && state.weeks[wKey][hIdx][d]);
        html += `<div class="cell ${checked?'checked':''}" data-habit="${hIdx}" data-day="${d}">
          <div class="mark">${checked?'✓':''}</div>
        </div>`;
      }
      html += `<button class="remove-btn" data-remove="${hIdx}">✕</button>`;
    });

    grid.innerHTML = html;
    bindEvents();
  }

  function bindEvents(){
    document.querySelectorAll('.cell').forEach(cell=>{
      cell.addEventListener('click', ()=>{
        const h = cell.dataset.habit;
        const d = cell.dataset.day;
        if(!state.weeks[wKey][h]) state.weeks[wKey][h] = {};
        state.weeks[wKey][h][d] = !state.weeks[wKey][h][d];
        save(state);
        render();
      });
    });
    document.querySelectorAll('[data-remove]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const idx = Number(btn.dataset.remove);
        state.habits.splice(idx,1);
        // reindex week data
        Object.keys(state.weeks).forEach(wk=>{
          const newWeek = {};
          Object.keys(state.weeks[wk]).forEach(k=>{
            const ki = Number(k);
            if(ki < idx) newWeek[ki] = state.weeks[wk][k];
            else if(ki > idx) newWeek[ki-1] = state.weeks[wk][k];
          });
          state.weeks[wk] = newWeek;
        });
        save(state);
        render();
      });
    });
    document.querySelectorAll('[data-action="rename"]').forEach(inp=>{
      inp.addEventListener('blur', ()=>{
        const idx = Number(inp.dataset.idx);
        state.habits[idx] = inp.value.trim() || state.habits[idx];
        save(state);
      });
    });
  }

  document.getElementById('addHabitBtn').addEventListener('click', addHabit);
  document.getElementById('newHabitInput').addEventListener('keydown', e=>{
    if(e.key==='Enter') addHabit();
  });
  function addHabit(){
    const input = document.getElementById('newHabitInput');
    const val = input.value.trim();
    if(!val) return;
    state.habits.push(val);
    save(state);
    input.value = '';
    render();
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  render();
</script>

</body>
</html>
