<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Hub</title>
<style>
  :root{
    --text:#37352f;
    --text-muted:#787774;
    --text-faint:#9b9a97;
    --line:rgba(55,53,47,0.12);
    --hover:rgba(55,53,47,0.06);
    --field:rgba(55,53,47,0.055);
    --accent:#d9730d;
    --accent-soft:rgba(217,115,13,0.13);
    --danger:#eb5757;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --text:#e9e9e7;
      --text-muted:#9b9b9b;
      --text-faint:#767676;
      --line:rgba(255,255,255,0.13);
      --hover:rgba(255,255,255,0.07);
      --field:rgba(255,255,255,0.065);
      --accent:#e0a032;
      --accent-soft:rgba(224,160,50,0.16);
      --danger:#ff6369;
    }
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0;
    background:transparent;
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    font-size:14px;
  }
  .widget{
    width:100%;
    padding:4px 2px 8px;
  }
  .header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:12px;
  }
  .header h1{
    font-weight:600;
    font-size:17px;
    margin:0;
  }
  .header .count{
    font-size:12px;
    color:var(--text-faint);
  }

  .navbar{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    margin-bottom:14px;
    padding-bottom:12px;
    border-bottom:1px solid var(--line);
  }
  .nav-chip{
    font-size:11.5px;
    font-weight:500;
    padding:5px 12px;
    border-radius:14px;
    border:1px solid var(--line);
    color:var(--text-muted);
    cursor:pointer;
    user-select:none;
    background:var(--field);
  }
  .nav-chip:hover{ background:var(--hover); }
  .nav-chip.active{
    background:var(--accent-soft);
    color:var(--accent);
    border-color:transparent;
  }

  .link-list{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:8px;
    margin-bottom:16px;
  }
  .link-card{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:7px;
    background:var(--field);
    border:1px solid var(--line);
    border-radius:8px;
    padding:16px 8px 12px;
    text-decoration:none;
    color:var(--text);
    transition:background-color .12s ease, border-color .12s ease;
    position:relative;
    text-align:center;
  }
  .link-card:hover{
    background:var(--hover);
    border-color:var(--text-faint);
  }
  .link-emoji{
    font-size:22px;
    width:42px;
    height:42px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--hover);
    border-radius:8px;
    flex-shrink:0;
  }
  .link-info{ width:100%; }
  .link-title{
    font-size:12.5px;
    font-weight:500;
    margin:0;
    line-height:1.25;
  }
  .link-url{ display:none; }
  .link-tag{
    font-size:9px;
    letter-spacing:0.02em;
    font-weight:500;
    padding:2px 7px;
    border-radius:5px;
    background:var(--hover);
    color:var(--text-faint);
  }
  .link-remove{
    position:absolute;
    top:5px;
    right:5px;
    background:var(--field);
    border:1px solid var(--line);
    border-radius:50%;
    width:18px;
    height:18px;
    color:var(--text-faint);
    font-size:10px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    transition:opacity .15s ease;
  }
  .link-card:hover .link-remove{ opacity:1; }
  .link-remove:hover{ color:var(--danger); border-color:var(--danger); }

  .empty{
    text-align:center;
    color:var(--text-faint);
    font-size:13px;
    padding:22px 0;
    grid-column: 1 / -1;
  }

  .add-toggle{
    width:100%;
    background:var(--field);
    border:1px dashed var(--line);
    border-radius:6px;
    padding:10px;
    color:var(--text-muted);
    font-size:13px;
    font-weight:500;
    cursor:pointer;
    font-family:inherit;
  }
  .add-toggle:hover{ color:var(--text); border-color:var(--text-faint); background:var(--hover); }

  .add-form{
    display:none;
    flex-direction:column;
    gap:8px;
    background:var(--field);
    border:1px solid var(--line);
    border-radius:6px;
    padding:12px;
    margin-top:8px;
  }
  .add-form.open{ display:flex; }
  .add-form .row{ display:flex; gap:8px; }
  .add-form input, .add-form select{
    background:var(--field);
    border:1px solid var(--line);
    border-radius:5px;
    padding:8px 10px;
    color:var(--text);
    font-family:inherit;
    font-size:13px;
    outline:none;
    flex:1;
    min-width:0;
  }
  .add-form input:focus{ border-color:var(--text-faint); }
  .add-form input::placeholder{ color:var(--text-faint); }
  .emoji-input{ flex: 0 0 50px !important; text-align:center; }
  .add-form .save-btn{
    background:var(--accent);
    border:none;
    border-radius:5px;
    padding:9px;
    color:#fff;
    font-weight:600;
    font-size:13px;
    cursor:pointer;
    font-family:inherit;
  }
  .add-form .save-btn:hover{ opacity:0.9; }
</style>
</head>
<body>

<div class="widget">
  <div class="header">
    <h1>Links</h1>
    <span class="count" id="count"></span>
  </div>

  <div class="navbar" id="navbar"></div>

  <div class="link-list" id="linkList"></div>

  <button class="add-toggle" id="addToggle">+ Add a link</button>
  <div class="add-form" id="addForm">
    <div class="row">
      <input type="text" id="emojiInput" class="emoji-input" placeholder="🔗" maxlength="2">
      <input type="text" id="titleInput" placeholder="Title (e.g. Instagram)">
    </div>
    <input type="text" id="urlInput" placeholder="https://…">
    <div class="row">
      <input type="text" id="categoryInput" placeholder="Category (e.g. Social)" list="categorySuggestions">
      <datalist id="categorySuggestions"></datalist>
    </div>
    <button class="save-btn" id="saveLinkBtn">Save link</button>
  </div>
</div>

<script>
  const STORAGE_KEY = 'linkHubWidget';

  function load(){
    try{
      const s = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if(Array.isArray(s)) return s;
    }catch(e){}
    return [
      { id:1, emoji:'📸', title:'Instagram', url:'instagram.com/yourhandle', category:'Social' },
      { id:2, emoji:'💼', title:'Portfolio', url:'yourportfolio.com', category:'Work' },
      { id:3, emoji:'✉️', title:'Email me', url:'mailto:you@email.com', category:'Contact' },
    ];
  }
  function save(links){ localStorage.setItem(STORAGE_KEY, JSON.stringify(links)); }

  let links = load();
  let activeCat = 'All';

  function getCategories(){
    const cats = [...new Set(links.map(l=>l.category).filter(Boolean))];
    return ['All', ...cats];
  }

  function fullUrl(u){
    if(u.startsWith('http') || u.startsWith('mailto:')) return u;
    return 'https://' + u;
  }

  function render(){
    const cats = getCategories();
    document.getElementById('navbar').innerHTML = cats.map(c =>
      `<div class="nav-chip ${c===activeCat?'active':''}" data-cat="${c}">${c}</div>`
    ).join('');
    document.querySelectorAll('.nav-chip').forEach(chip=>{
      chip.addEventListener('click', ()=>{
        activeCat = chip.dataset.cat;
        render();
      });
    });

    document.getElementById('categorySuggestions').innerHTML =
      cats.filter(c=>c!=='All').map(c=>`<option value="${c}">`).join('');

    const filtered = activeCat==='All' ? links : links.filter(l=>l.category===activeCat);
    document.getElementById('count').textContent = `${links.length} link${links.length===1?'':'s'}`;

    const list = document.getElementById('linkList');
    if(filtered.length===0){
      list.innerHTML = '<div class="empty">No links here yet.</div>';
      return;
    }
    list.innerHTML = filtered.map(l => `
      <a class="link-card" href="${fullUrl(l.url)}" target="_blank" rel="noopener" data-id="${l.id}">
        <button class="link-remove" data-remove="${l.id}">✕</button>
        <div class="link-emoji">${l.emoji || '🔗'}</div>
        <div class="link-info">
          <p class="link-title">${escapeHtml(l.title)}</p>
        </div>
        ${l.category ? `<span class="link-tag">${escapeHtml(l.category)}</span>` : ''}
      </a>
    `).join('');

    list.querySelectorAll('[data-remove]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.preventDefault();
        e.stopPropagation();
        const id = Number(btn.dataset.remove);
        links = links.filter(l=>l.id!==id);
        save(links);
        render();
      });
    });
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  document.getElementById('addToggle').addEventListener('click', ()=>{
    document.getElementById('addForm').classList.toggle('open');
  });

  document.getElementById('saveLinkBtn').addEventListener('click', ()=>{
    const emoji = document.getElementById('emojiInput').value.trim() || '🔗';
    const title = document.getElementById('titleInput').value.trim();
    const url = document.getElementById('urlInput').value.trim();
    const category = document.getElementById('categoryInput').value.trim() || 'Other';
    if(!title || !url) return;

    links.push({ id: Date.now(), emoji, title, url, category });
    save(links);

    document.getElementById('emojiInput').value = '';
    document.getElementById('titleInput').value = '';
    document.getElementById('urlInput').value = '';
    document.getElementById('categoryInput').value = '';
    document.getElementById('addForm').classList.remove('open');

    render();
  });

  render();
</script>

</body>
</html>
