<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1B1F3B;
    --card:#242952;
    --card-edge:#2F356B;
    --field:#1F2447;
    --text:#F1EEE5;
    --muted:#9098C4;
    --muted-dim:#6870A0;
    --accent:#E8C468;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0;
    background:var(--bg);
    font-family:'Inter',sans-serif;
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  .widget{
    width:100%;
    max-width:560px;
    margin:0 auto;
    padding:36px 28px 50px;
  }
  .header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:20px;
  }
  .header h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:26px;
    margin:0;
  }
  .header .count{
    font-size:12px;
    color:var(--muted);
  }

  .navbar{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    margin-bottom:20px;
    padding-bottom:16px;
    border-bottom:1px solid var(--card-edge);
  }
  .nav-chip{
    font-size:11px;
    letter-spacing:0.04em;
    text-transform:uppercase;
    font-weight:600;
    padding:7px 14px;
    border-radius:20px;
    border:1px solid var(--card-edge);
    color:var(--muted);
    cursor:pointer;
    user-select:none;
  }
  .nav-chip.active{
    background:var(--accent);
    color:var(--bg);
    border-color:var(--accent);
  }

  .link-list{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:12px;
    margin-bottom:22px;
  }
  .link-card{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;
    background:var(--card);
    border:1px solid var(--card-edge);
    border-radius:16px;
    padding:20px 10px 14px;
    text-decoration:none;
    color:var(--text);
    transition:border-color .15s ease, transform .15s ease;
    position:relative;
    text-align:center;
  }
  .link-card:hover{
    border-color:var(--accent);
    transform:translateY(-2px);
  }
  .link-emoji{
    font-size:26px;
    width:52px;
    height:52px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--field);
    border-radius:14px;
    flex-shrink:0;
  }
  .link-info{ width:100%; }
  .link-title{
    font-size:13px;
    font-weight:600;
    margin:0;
    line-height:1.25;
  }
  .link-url{ display:none; }
  .link-tag{
    font-size:8.5px;
    letter-spacing:0.04em;
    text-transform:uppercase;
    font-weight:600;
    padding:3px 8px;
    border-radius:6px;
    background:var(--field);
    color:var(--muted);
  }
  .link-remove{
    position:absolute;
    top:6px;
    right:6px;
    background:var(--field);
    border:none;
    border-radius:50%;
    width:20px;
    height:20px;
    color:var(--muted-dim);
    font-size:11px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    transition:opacity .15s ease;
  }
  .link-card:hover .link-remove{ opacity:1; }
  .link-remove:hover{ color:#E8734A; }

  .empty{
    text-align:center;
    color:var(--muted-dim);
    font-size:13px;
    padding:30px 0;
  }

  .add-toggle{
    width:100%;
    background:var(--field);
    border:1px dashed var(--card-edge);
    border-radius:12px;
    padding:12px;
    color:var(--muted);
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .add-toggle:hover{ color:var(--text); border-color:var(--muted); }

  .add-form{
    display:none;
    flex-direction:column;
    gap:10px;
    background:var(--card);
    border:1px solid var(--card-edge);
    border-radius:14px;
    padding:16px;
    margin-top:10px;
  }
  .add-form.open{ display:flex; }
  .add-form .row{ display:flex; gap:8px; }
  .add-form input, .add-form select{
    background:var(--field);
    border:1px solid var(--card-edge);
    border-radius:10px;
    padding:10px 12px;
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:13px;
    outline:none;
    flex:1;
    min-width:0;
  }
  .add-form input::placeholder{ color:var(--muted-dim); }
  .emoji-input{ flex: 0 0 60px !important; text-align:center; }
  .add-form .save-btn{
    background:var(--accent);
    border:none;
    border-radius:10px;
    padding:11px;
    color:var(--bg);
    font-weight:700;
    font-size:13px;
    cursor:pointer;
  }
</style>
</head>
<body>

<div class="widget">
  <div class="header">
    <h1>Links</h1>
    <span class="count" id="count"></span>
  </div>

  <div class="navbar" id="navbar"></div>

  <div class="link-list" id="linkList"></div>

  <button class="add-toggle" id="addToggle">+ Add a link</button>
  <div class="add-form" id="addForm">
    <div class="row">
      <input type="text" id="emojiInput" class="emoji-input" placeholder="🔗" maxlength="2">
      <input type="text" id="titleInput" placeholder="Title (e.g. Instagram)">
    </div>
    <input type="text" id="urlInput" placeholder="https://…">
    <div class="row">
      <input type="text" id="categoryInput" placeholder="Category (e.g. Social)" list="categorySuggestions">
      <datalist id="categorySuggestions"></datalist>
    </div>
    <button class="save-btn" id="saveLinkBtn">Save link</button>
  </div>
</div>

<script>
  const STORAGE_KEY = 'linkHubWidget';

  function load(){
    try{
      const s = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if(Array.isArray(s)) return s;
    }catch(e){}
    return [
      { id:1, emoji:'📸', title:'Instagram', url:'instagram.com/yourhandle', category:'Social' },
      { id:2, emoji:'💼', title:'Portfolio', url:'yourportfolio.com', category:'Work' },
      { id:3, emoji:'✉️', title:'Email me', url:'mailto:you@email.com', category:'Contact' },
    ];
  }
  function save(links){ localStorage.setItem(STORAGE_KEY, JSON.stringify(links)); }

  let links = load();
  let activeCat = 'All';

  function getCategories(){
    const cats = [...new Set(links.map(l=>l.category).filter(Boolean))];
    return ['All', ...cats];
  }

  function fullUrl(u){
    if(u.startsWith('http') || u.startsWith('mailto:')) return u;
    return 'https://' + u;
  }

  function render(){
    const cats = getCategories();
    document.getElementById('navbar').innerHTML = cats.map(c =>
      `<div class="nav-chip ${c===activeCat?'active':''}" data-cat="${c}">${c}</div>`
    ).join('');
    document.querySelectorAll('.nav-chip').forEach(chip=>{
      chip.addEventListener('click', ()=>{
        activeCat = chip.dataset.cat;
        render();
      });
    });

    document.getElementById('categorySuggestions').innerHTML =
      cats.filter(c=>c!=='All').map(c=>`<option value="${c}">`).join('');

    const filtered = activeCat==='All' ? links : links.filter(l=>l.category===activeCat);
    document.getElementById('count').textContent = `${links.length} link${links.length===1?'':'s'}`;

    const list = document.getElementById('linkList');
    if(filtered.length===0){
      list.innerHTML = '<div class="empty">No links here yet.</div>';
      return;
    }
    list.innerHTML = filtered.map(l => `
      <a class="link-card" href="${fullUrl(l.url)}" target="_blank" rel="noopener" data-id="${l.id}">
        <button class="link-remove" data-remove="${l.id}">✕</button>
        <div class="link-emoji">${l.emoji || '🔗'}</div>
        <div class="link-info">
          <p class="link-title">${escapeHtml(l.title)}</p>
        </div>
        ${l.category ? `<span class="link-tag">${escapeHtml(l.category)}</span>` : ''}
      </a>
    `).join('');

    list.querySelectorAll('[data-remove]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.preventDefault();
        e.stopPropagation();
        const id = Number(btn.dataset.remove);
        links = links.filter(l=>l.id!==id);
        save(links);
        render();
      });
    });
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  document.getElementById('addToggle').addEventListener('click', ()=>{
    document.getElementById('addForm').classList.toggle('open');
  });

  document.getElementById('saveLinkBtn').addEventListener('click', ()=>{
    const emoji = document.getElementById('emojiInput').value.trim() || '🔗';
    const title = document.getElementById('titleInput').value.trim();
    const url = document.getElementById('urlInput').value.trim();
    const category = document.getElementById('categoryInput').value.trim() || 'Other';
    if(!title || !url) return;

    links.push({ id: Date.now(), emoji, title, url, category });
    save(links);

    document.getElementById('emojiInput').value = '';
    document.getElementById('titleInput').value = '';
    document.getElementById('urlInput').value = '';
    document.getElementById('categoryInput').value = '';
    document.getElementById('addForm').classList.remove('open');

    render();
  });

  render();
</script>

</body>
</html>
