<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Countdown</title>
<style>
  :root{
    --text:#37352f;
    --text-muted:#787774;
    --text-faint:#9b9a97;
    --line:rgba(55,53,47,0.12);
    --hover:rgba(55,53,47,0.06);
    --field:rgba(55,53,47,0.055);
    --glow-far:#337ea9;
    --glow-mid:#c87fa0;
    --glow-near:#eb5757;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --text:#e9e9e7;
      --text-muted:#9b9b9b;
      --text-faint:#767676;
      --line:rgba(255,255,255,0.13);
      --hover:rgba(255,255,255,0.07);
      --field:rgba(255,255,255,0.065);
      --glow-far:#5fb3e0;
      --glow-mid:#e0a0bd;
      --glow-near:#ff6369;
    }
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0;
    background:transparent;
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    font-size:14px;
  }
  .widget{
    width:100%;
    padding:6px 2px;
  }
  .card{
    width:100%;
    text-align:center;
    padding-top:4px;
  }
  .accent-bar{
    width:36px;
    height:3px;
    border-radius:2px;
    margin:0 auto 16px;
    transition:background 1.2s ease;
  }
  .eyebrow{
    font-size:11px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--text-faint);
    margin-bottom:8px;
    font-weight:600;
  }
  .exam-name{
    font-size:15px;
    font-weight:600;
    color:var(--text);
    margin:0 0 18px;
    outline:none;
    border-bottom:1px dashed transparent;
    cursor:text;
    transition:border-color .2s ease;
    display:inline-block;
  }
  .exam-name:hover, .exam-name:focus{
    border-bottom-color:var(--text-faint);
  }
  .days-number{
    font-weight:600;
    font-size:52px;
    line-height:1;
    margin:0;
    letter-spacing:-0.01em;
  }
  .days-label{
    font-size:11.5px;
    letter-spacing:0.04em;
    text-transform:uppercase;
    color:var(--text-faint);
    margin-top:5px;
    font-weight:500;
  }
  .breakdown{
    display:flex;
    justify-content:center;
    gap:14px;
    margin-top:16px;
    padding-top:14px;
    border-top:1px solid var(--line);
  }
  .unit{
    display:flex;
    flex-direction:column;
    align-items:center;
    min-width:40px;
  }
  .unit-value{
    font-size:16px;
    font-weight:600;
    font-variant-numeric:tabular-nums;
  }
  .unit-label{
    font-size:9px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    color:var(--text-faint);
    margin-top:2px;
  }
  .date-row{
    margin-top:16px;
    font-size:12px;
    color:var(--text-faint);
  }
  .date-row input{
    background:var(--field);
    border:1px solid var(--line);
    border-radius:5px;
    color:var(--text-muted);
    font-family:inherit;
    font-size:12px;
    text-align:center;
    outline:none;
    cursor:pointer;
    width:130px;
    padding:4px 6px;
  }
  .date-row input:focus{ border-color:var(--text-faint); }
  .done{
    font-size:20px;
    font-weight:600;
    padding:16px 0 4px;
  }
</style>
</head>
<body>

<div class="widget">
  <div class="card">
    <div class="accent-bar" id="glow"></div>
    <div class="eyebrow">Countdown</div>
    <div class="exam-name" id="examName" contenteditable="true" spellcheck="false">Organic Chemistry Final</div>

    <div id="mainDisplay">
      <div class="days-number" id="daysNumber">--</div>
      <div class="days-label" id="daysLabel">days left</div>
      <div class="breakdown">
        <div class="unit"><div class="unit-value" id="hoursVal">00</div><div class="unit-label">hrs</div></div>
        <div class="unit"><div class="unit-value" id="minsVal">00</div><div class="unit-label">min</div></div>
        <div class="unit"><div class="unit-value" id="secsVal">00</div><div class="unit-label">sec</div></div>
      </div>
    </div>

    <div class="date-row">
      exam date &nbsp;<input type="date" id="examDate">
    </div>
  </div>
</div>

<script>
  const nameEl = document.getElementById('examName');
  const dateEl = document.getElementById('examDate');
  const glowEl = document.getElementById('glow');
  const daysNumber = document.getElementById('daysNumber');
  const daysLabel = document.getElementById('daysLabel');
  const mainDisplay = document.getElementById('mainDisplay');

  // Load saved state or set sensible default (14 days from now)
  const STORAGE_KEY = 'examCountdownWidget';
  function loadState(){
    try{
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if(saved && saved.name && saved.date) return saved;
    }catch(e){}
    const d = new Date();
    d.setDate(d.getDate() + 14);
    return { name: 'Organic Chemistry Final', date: d.toISOString().slice(0,10) };
  }
  function saveState(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      name: nameEl.textContent.trim(),
      date: dateEl.value
    }));
  }

  const state = loadState();
  nameEl.textContent = state.name;
  dateEl.value = state.date;

  nameEl.addEventListener('blur', saveState);
  nameEl.addEventListener('keydown', e=>{
    if(e.key==='Enter'){ e.preventDefault(); nameEl.blur(); }
  });
  dateEl.addEventListener('change', ()=>{ saveState(); tick(); });

  function lerpColor(a, b, t){
    const ah = a.match(/\w\w/g).map(x=>parseInt(x,16));
    const bh = b.match(/\w\w/g).map(x=>parseInt(x,16));
    const r = ah.map((c,i)=>Math.round(c + (bh[i]-c)*t));
    return `#${r.map(x=>x.toString(16).padStart(2,'0')).join('')}`;
  }

  function tick(){
    const target = new Date(dateEl.value + 'T23:59:59');
    const now = new Date();
    const diffMs = target - now;

    if(diffMs <= 0){
      mainDisplay.innerHTML = '<div class="done">🎉 It\'s exam day</div>';
      glowEl.style.background = '#eb5757';
      return;
    }

    const totalSec = Math.floor(diffMs/1000);
    const days = Math.floor(totalSec / 86400);
    const hours = Math.floor((totalSec % 86400)/3600);
    const mins = Math.floor((totalSec % 3600)/60);
    const secs = totalSec % 60;

    daysNumber.textContent = days;
    daysLabel.textContent = days === 1 ? 'day left' : 'days left';
    document.getElementById('hoursVal').textContent = String(hours).padStart(2,'0');
    document.getElementById('minsVal').textContent = String(mins).padStart(2,'0');
    document.getElementById('secsVal').textContent = String(secs).padStart(2,'0');

    // urgency accent color: far (>=21d) cool blue -> mid (~7d) rose -> near (<=2d) warm alert
    let color;
    if(days >= 21){
      color = getComputedStyle(document.documentElement).getPropertyValue('--glow-far').trim();
    } else if(days >= 7){
      const t = 1 - (days-7)/14;
      color = lerpColor(
        getComputedStyle(document.documentElement).getPropertyValue('--glow-far').trim(),
        getComputedStyle(document.documentElement).getPropertyValue('--glow-mid').trim(),
        t
      );
    } else {
      const t = 1 - Math.min(days,7)/7;
      color = lerpColor(
        getComputedStyle(document.documentElement).getPropertyValue('--glow-mid').trim(),
        getComputedStyle(document.documentElement).getPropertyValue('--glow-near').trim(),
        t
      );
    }
    glowEl.style.background = color;
  }

  tick();
  setInterval(tick, 1000);
</script>

</body>
</html>
