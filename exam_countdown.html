<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Countdown</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1B1F3B;
    --card:#242952;
    --card-edge:#2F356B;
    --text:#F1EEE5;
    --muted:#9098C4;
    --glow-far:#6C7BC4;
    --glow-mid:#C87FA0;
    --glow-near:#E8734A;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg);
    font-family:'Inter',sans-serif;
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  .widget{
    position:relative;
    width:100%;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    padding:24px;
  }
  .glow{
    position:absolute;
    width:480px; height:480px;
    border-radius:50%;
    filter:blur(90px);
    opacity:0.55;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    transition:background 1.2s ease;
    pointer-events:none;
  }
  .card{
    position:relative;
    z-index:1;
    background:var(--card);
    border:1px solid var(--card-edge);
    border-radius:20px;
    padding:36px 40px 30px;
    width:100%;
    max-width:320px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.35);
  }
  .eyebrow{
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:10px;
    font-weight:600;
  }
  .exam-name{
    font-family:'Fraunces',serif;
    font-size:20px;
    font-weight:500;
    color:var(--text);
    margin:0 0 22px;
    outline:none;
    border-bottom:1px dashed transparent;
    cursor:text;
    transition:border-color .2s ease;
  }
  .exam-name:hover, .exam-name:focus{
    border-bottom-color:var(--muted);
  }
  .days-number{
    font-family:'Fraunces',serif;
    font-optical-sizing:auto;
    font-weight:600;
    font-size:88px;
    line-height:1;
    margin:0;
    letter-spacing:-0.02em;
  }
  .days-label{
    font-size:12px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--muted);
    margin-top:6px;
    font-weight:500;
  }
  .breakdown{
    display:flex;
    justify-content:center;
    gap:18px;
    margin-top:22px;
    padding-top:20px;
    border-top:1px solid var(--card-edge);
  }
  .unit{
    display:flex;
    flex-direction:column;
    align-items:center;
    min-width:44px;
  }
  .unit-value{
    font-size:18px;
    font-weight:600;
    font-variant-numeric:tabular-nums;
  }
  .unit-label{
    font-size:9px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--muted);
    margin-top:3px;
  }
  .date-row{
    margin-top:20px;
    font-size:12px;
    color:var(--muted);
  }
  .date-row input{
    background:transparent;
    border:none;
    color:var(--muted);
    font-family:'Inter',sans-serif;
    font-size:12px;
    text-align:center;
    outline:none;
    cursor:pointer;
    width:130px;
  }
  .date-row input::-webkit-calendar-picker-indicator{
    filter:invert(0.6);
    cursor:pointer;
  }
  .done{
    font-family:'Fraunces',serif;
    font-size:26px;
    padding:20px 0 4px;
  }
  .hint{
    position:absolute;
    bottom:10px;
    right:14px;
    font-size:9px;
    color:var(--card-edge);
    letter-spacing:0.05em;
  }
</style>
</head>
<body>

<div class="widget">
  <div class="glow" id="glow"></div>
  <div class="card">
    <div class="eyebrow">Countdown</div>
    <div class="exam-name" id="examName" contenteditable="true" spellcheck="false">Organic Chemistry Final</div>

    <div id="mainDisplay">
      <div class="days-number" id="daysNumber">--</div>
      <div class="days-label" id="daysLabel">days left</div>
      <div class="breakdown">
        <div class="unit"><div class="unit-value" id="hoursVal">00</div><div class="unit-label">hrs</div></div>
        <div class="unit"><div class="unit-value" id="minsVal">00</div><div class="unit-label">min</div></div>
        <div class="unit"><div class="unit-value" id="secsVal">00</div><div class="unit-label">sec</div></div>
      </div>
    </div>

    <div class="date-row">
      exam date &nbsp;<input type="date" id="examDate">
    </div>
  </div>
  <div class="hint">edit name / date</div>
</div>

<script>
  const nameEl = document.getElementById('examName');
  const dateEl = document.getElementById('examDate');
  const glowEl = document.getElementById('glow');
  const daysNumber = document.getElementById('daysNumber');
  const daysLabel = document.getElementById('daysLabel');
  const mainDisplay = document.getElementById('mainDisplay');

  // Load saved state or set sensible default (14 days from now)
  const STORAGE_KEY = 'examCountdownWidget';
  function loadState(){
    try{
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if(saved && saved.name && saved.date) return saved;
    }catch(e){}
    const d = new Date();
    d.setDate(d.getDate() + 14);
    return { name: 'Organic Chemistry Final', date: d.toISOString().slice(0,10) };
  }
  function saveState(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      name: nameEl.textContent.trim(),
      date: dateEl.value
    }));
  }

  const state = loadState();
  nameEl.textContent = state.name;
  dateEl.value = state.date;

  nameEl.addEventListener('blur', saveState);
  nameEl.addEventListener('keydown', e=>{
    if(e.key==='Enter'){ e.preventDefault(); nameEl.blur(); }
  });
  dateEl.addEventListener('change', ()=>{ saveState(); tick(); });

  function lerpColor(a, b, t){
    const ah = a.match(/\w\w/g).map(x=>parseInt(x,16));
    const bh = b.match(/\w\w/g).map(x=>parseInt(x,16));
    const r = ah.map((c,i)=>Math.round(c + (bh[i]-c)*t));
    return `#${r.map(x=>x.toString(16).padStart(2,'0')).join('')}`;
  }

  function tick(){
    const target = new Date(dateEl.value + 'T23:59:59');
    const now = new Date();
    const diffMs = target - now;

    if(diffMs <= 0){
      mainDisplay.innerHTML = '<div class="done">🎉 It\'s exam day</div>';
      glowEl.style.background = '#E8734A';
      return;
    }

    const totalSec = Math.floor(diffMs/1000);
    const days = Math.floor(totalSec / 86400);
    const hours = Math.floor((totalSec % 86400)/3600);
    const mins = Math.floor((totalSec % 3600)/60);
    const secs = totalSec % 60;

    daysNumber.textContent = days;
    daysLabel.textContent = days === 1 ? 'day left' : 'days left';
    document.getElementById('hoursVal').textContent = String(hours).padStart(2,'0');
    document.getElementById('minsVal').textContent = String(mins).padStart(2,'0');
    document.getElementById('secsVal').textContent = String(secs).padStart(2,'0');

    // urgency glow: far (>=21d) cool blue -> mid (~7d) rose -> near (<=2d) warm alert
    let color;
    if(days >= 21){
      color = '#6C7BC4';
    } else if(days >= 7){
      const t = 1 - (days-7)/14;
      color = lerpColor('#6C7BC4','#C87FA0', t);
    } else {
      const t = 1 - Math.min(days,7)/7;
      color = lerpColor('#C87FA0','#E8734A', t);
    }
    glowEl.style.background = color;
  }

  tick();
  setInterval(tick, 1000);
</script>

</body>
</html>
