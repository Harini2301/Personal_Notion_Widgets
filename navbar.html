<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navbar</title>
<style>
  :root{
    --text:#37352f;
    --text-muted:#787774;
    --text-faint:#9b9a97;
    --line:rgba(55,53,47,0.12);
    --hover:rgba(55,53,47,0.06);
    --field:rgba(55,53,47,0.055);
    --accent:#d9730d;
    --accent-soft:rgba(217,115,13,0.13);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --text:#e9e9e7;
      --text-muted:#9b9b9b;
      --text-faint:#767676;
      --line:rgba(255,255,255,0.13);
      --hover:rgba(255,255,255,0.07);
      --field:rgba(255,255,255,0.065);
      --accent:#e0a032;
      --accent-soft:rgba(224,160,50,0.16);
    }
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0;
    background:transparent;
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    font-size:14px;
  }
  .widget{
    width:100%;
    padding:4px 2px 6px;
  }
  .top-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
  }
  .brand{
    font-weight:600;
    font-size:12.5px;
    color:var(--text-faint);
    text-transform:uppercase;
    letter-spacing:0.03em;
  }
  .mode-toggle{
    display:flex;
    gap:2px;
    background:var(--field);
    border:1px solid var(--line);
    border-radius:7px;
    padding:2px;
  }
  .mode-btn{
    font-size:11px;
    font-weight:500;
    padding:5px 10px;
    border-radius:5px;
    color:var(--text-muted);
    cursor:pointer;
    border:none;
    background:none;
    font-family:inherit;
  }
  .mode-btn.active{
    background:var(--accent-soft);
    color:var(--accent);
    font-weight:600;
  }

  /* ---- Horizontal nav ---- */
  .nav-horizontal{
    display:flex;
    gap:2px;
    flex-wrap:wrap;
    padding:3px 0;
    border-top:1px solid var(--line);
    border-bottom:1px solid var(--line);
  }
  .nav-horizontal .nav-item{
    display:flex;
    align-items:center;
    gap:6px;
    padding:8px 12px;
    border-radius:6px;
    text-decoration:none;
    color:var(--text-muted);
    font-size:13px;
    font-weight:500;
    transition:background .12s ease, color .12s ease;
  }
  .nav-horizontal .nav-item:hover{ background:var(--hover); color:var(--text); }
  .nav-horizontal .nav-item.active-tab{ background:var(--accent-soft); color:var(--accent); font-weight:600; }

  /* ---- Vertical nav ---- */
  .nav-vertical{
    display:flex;
    flex-direction:column;
    gap:2px;
    max-width:220px;
    padding:4px 0;
  }
  .nav-vertical .nav-item{
    display:flex;
    align-items:center;
    gap:9px;
    padding:8px 10px;
    border-radius:6px;
    text-decoration:none;
    color:var(--text-muted);
    font-size:13.5px;
    font-weight:500;
    transition:background .12s ease, color .12s ease;
  }
  .nav-vertical .nav-item:hover{ background:var(--hover); color:var(--text); }
  .nav-vertical .nav-item.active-tab{ background:var(--accent-soft); color:var(--accent); font-weight:600; }

  .nav-icon{ font-size:14px; width:16px; text-align:center; flex-shrink:0; }
  .nav-remove{
    margin-left:auto;
    background:none;
    border:none;
    color:inherit;
    opacity:0;
    font-size:11px;
    cursor:pointer;
    padding:2px;
  }
  .nav-item:hover .nav-remove{ opacity:0.6; }
  .nav-remove:hover{ opacity:1 !important; }

  .add-toggle{
    margin-top:10px;
    background:var(--field);
    border:1px dashed var(--line);
    border-radius:6px;
    padding:8px 14px;
    color:var(--text-muted);
    font-size:12px;
    font-weight:500;
    cursor:pointer;
    font-family:inherit;
  }
  .add-toggle:hover{ color:var(--text); border-color:var(--text-faint); background:var(--hover); }

  .add-form{
    display:none;
    gap:8px;
    background:var(--field);
    border:1px solid var(--line);
    border-radius:6px;
    padding:12px;
    margin-top:8px;
    flex-wrap:wrap;
  }
  .add-form.open{ display:flex; }
  .add-form input{
    background:var(--field);
    border:1px solid var(--line);
    border-radius:5px;
    padding:7px 10px;
    color:var(--text);
    font-family:inherit;
    font-size:12.5px;
    outline:none;
  }
  .add-form input:focus{ border-color:var(--text-faint); }
  .add-form input::placeholder{ color:var(--text-faint); }
  #navIconInput{ width:44px; text-align:center; flex:0 0 44px; }
  #navLabelInput{ flex:1; min-width:100px; }
  #navUrlInput{ flex:1; min-width:160px; }
  .add-form .save-btn{
    background:var(--accent);
    border:none;
    border-radius:5px;
    padding:8px 14px;
    color:#fff;
    font-weight:600;
    font-size:12.5px;
    cursor:pointer;
    font-family:inherit;
  }
  .add-form .save-btn:hover{ opacity:0.9; }
</style>
</head>
<body>

<div class="widget">
  <div class="top-row">
    <span class="brand">workspace</span>
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="horizontal">Horizontal</button>
      <button class="mode-btn" data-mode="vertical">Vertical</button>
    </div>
  </div>

  <div id="navContainer"></div>

  <button class="add-toggle" id="addToggle">+ Add tab</button>
  <div class="add-form" id="addForm">
    <input type="text" id="navIconInput" placeholder="🏠" maxlength="2">
    <input type="text" id="navLabelInput" placeholder="Label (e.g. Notes)">
    <input type="text" id="navUrlInput" placeholder="Paste Notion page link…">
    <button class="save-btn" id="saveNavBtn">Add</button>
  </div>
</div>

<script>
  const STORAGE_KEY = 'navbarWidget';

  function load(){
    try{
      const s = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if(s && Array.isArray(s.tabs)) return s;
    }catch(e){}
    return {
      mode: 'horizontal',
      activeId: 1,
      tabs: [
        { id:1, icon:'🏠', label:'Dashboard', url:'#' },
        { id:2, icon:'📝', label:'Notes', url:'#' },
        { id:3, icon:'✅', label:'Tasks', url:'#' },
        { id:4, icon:'🔥', label:'Habits', url:'#' },
      ]
    };
  }
  function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

  let state = load();

  function render(){
    document.querySelectorAll('.mode-btn').forEach(b=>{
      b.classList.toggle('active', b.dataset.mode === state.mode);
    });

    const container = document.getElementById('navContainer');
    const wrapClass = state.mode === 'horizontal' ? 'nav-horizontal' : 'nav-vertical';

    container.innerHTML = `<div class="${wrapClass}">` + state.tabs.map(t => `
      <a class="nav-item ${t.id===state.activeId?'active-tab':''}" href="${t.url}" data-id="${t.id}">
        <span class="nav-icon">${t.icon || '•'}</span>
        <span>${escapeHtml(t.label)}</span>
        <button class="nav-remove" data-remove="${t.id}">✕</button>
      </a>
    `).join('') + `</div>`;

    container.querySelectorAll('.nav-item').forEach(el=>{
      el.addEventListener('click', (e)=>{
        if(e.target.closest('.nav-remove')) return;
        if(el.getAttribute('href') === '#') e.preventDefault();
        state.activeId = Number(el.dataset.id);
        save();
        render();
      });
    });
    container.querySelectorAll('[data-remove]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.preventDefault();
        e.stopPropagation();
        const id = Number(btn.dataset.remove);
        state.tabs = state.tabs.filter(t=>t.id!==id);
        save();
        render();
      });
    });
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  document.querySelectorAll('.mode-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      state.mode = btn.dataset.mode;
      save();
      render();
    });
  });

  document.getElementById('addToggle').addEventListener('click', ()=>{
    document.getElementById('addForm').classList.toggle('open');
  });

  document.getElementById('saveNavBtn').addEventListener('click', ()=>{
    const icon = document.getElementById('navIconInput').value.trim() || '📌';
    const label = document.getElementById('navLabelInput').value.trim();
    const url = document.getElementById('navUrlInput').value.trim() || '#';
    if(!label) return;
    state.tabs.push({ id: Date.now(), icon, label, url });
    save();
    document.getElementById('navIconInput').value = '';
    document.getElementById('navLabelInput').value = '';
    document.getElementById('navUrlInput').value = '';
    document.getElementById('addForm').classList.remove('open');
    render();
  });

  render();
</script>

</body>
</html>
