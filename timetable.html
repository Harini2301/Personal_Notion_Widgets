<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timetable</title>
<style>
  :root{
    --text:#37352f;
    --text-muted:#787774;
    --text-faint:#9b9a97;
    --line:rgba(55,53,47,0.12);
    --hover:rgba(55,53,47,0.06);
    --field:rgba(55,53,47,0.055);
    --accent:#d9730d;
    --overlay-bg:rgba(15,15,15,0.45);
    --popover-bg:#ffffff;
    --cell-text-on-color:#1b1b1b;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --text:#e9e9e7;
      --text-muted:#9b9b9b;
      --text-faint:#767676;
      --line:rgba(255,255,255,0.13);
      --hover:rgba(255,255,255,0.07);
      --field:rgba(255,255,255,0.065);
      --accent:#e0a032;
      --overlay-bg:rgba(0,0,0,0.6);
      --popover-bg:#2f2f2f;
      --cell-text-on-color:#1b1b1b;
    }
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0;
    background:transparent;
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    font-size:14px;
  }
  .widget{
    width:100%;
    padding:4px 2px 8px;
  }
  .header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:2px;
  }
  .header h1{
    font-weight:600;
    font-size:17px;
    margin:0;
  }
  .subtext{
    font-size:12px;
    color:var(--text-faint);
    margin-bottom:14px;
  }

  .grid-wrap{ overflow-x:auto; }
  .grid{
    display:grid;
    grid-template-columns: 52px repeat(6, 1fr);
    gap:4px;
    min-width:560px;
  }
  .corner{}
  .day-head{
    text-align:center;
    padding:4px 0 8px;
    font-size:11px;
    letter-spacing:0.03em;
    text-transform:uppercase;
    color:var(--text-faint);
    font-weight:600;
  }
  .time-label{
    display:flex;
    align-items:flex-start;
    justify-content:flex-end;
    padding:6px 6px 0 0;
    font-size:10.5px;
    color:var(--text-faint);
  }
  .cell{
    background:var(--field);
    border:1px solid var(--line);
    border-radius:5px;
    min-height:40px;
    cursor:pointer;
    padding:5px 6px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    transition:background-color .12s ease, border-color .12s ease;
  }
  .cell:hover{ border-color:var(--text-faint); background:var(--hover); }
  .cell.filled{
    border:1px solid transparent;
  }
  .cell .class-name{
    font-size:11.5px;
    font-weight:600;
    color:var(--cell-text-on-color);
    line-height:1.2;
  }
  .cell .class-loc{
    font-size:9.5px;
    color:var(--cell-text-on-color);
    opacity:0.7;
    margin-top:1px;
  }

  .legend{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-top:14px;
  }
  .legend-chip{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:12px;
    color:var(--text-muted);
    background:var(--field);
    border:1px solid var(--line);
    padding:4px 10px;
    border-radius:20px;
  }
  .legend-dot{
    width:8px; height:8px;
    border-radius:50%;
    flex-shrink:0;
  }

  /* ---- Editor popover ---- */
  .overlay{
    display:none;
    position:fixed;
    top:0; left:0; right:0; bottom:0;
    background:var(--overlay-bg);
    align-items:center;
    justify-content:center;
    z-index:10;
  }
  .overlay.open{ display:flex; }
  .editor{
    background:var(--popover-bg);
    border:1px solid var(--line);
    border-radius:10px;
    box-shadow:0 4px 14px rgba(0,0,0,0.15), 0 0 0 1px var(--line);
    padding:16px;
    width:270px;
  }
  .editor h3{
    font-size:14px;
    margin:0 0 12px;
    font-weight:600;
    color:var(--text);
  }
  .editor input{
    width:100%;
    background:var(--field);
    border:1px solid var(--line);
    border-radius:6px;
    padding:8px 10px;
    color:var(--text);
    font-family:inherit;
    font-size:13px;
    outline:none;
    margin-bottom:8px;
  }
  .editor input:focus{ border-color:var(--text-faint); }
  .editor input::placeholder{ color:var(--text-faint); }
  .color-row{
    display:flex;
    gap:7px;
    margin-bottom:14px;
  }
  .color-dot{
    width:20px; height:20px;
    border-radius:50%;
    cursor:pointer;
    border:2px solid transparent;
  }
  .color-dot.selected{
    border-color:var(--text-muted);
  }
  .editor-actions{
    display:flex;
    gap:6px;
  }
  .editor-actions button{
    flex:1;
    border:1px solid transparent;
    border-radius:6px;
    padding:8px;
    font-size:12.5px;
    font-weight:600;
    cursor:pointer;
    font-family:inherit;
  }
  .save-btn{ background:var(--accent); color:#fff; }
  .save-btn:hover{ opacity:0.9; }
  .clear-btn{ background:var(--field); color:var(--text-muted); border:1px solid var(--line) !important; }
  .clear-btn:hover{ background:var(--hover); }
  .cancel-btn{ background:none; color:var(--text-faint); }
  .cancel-btn:hover{ color:var(--text-muted); }
</style>
</head>
<body>

<div class="widget">
  <div class="header"><h1>Timetable</h1></div>
  <div class="subtext">Tap any slot to add or edit a class</div>

  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>

  <div class="legend" id="legend"></div>
</div>

<div class="overlay" id="overlay">
  <div class="editor">
    <h3 id="editorTitle">Add class</h3>
    <input type="text" id="classNameInput" placeholder="Class name (e.g. Chemistry)">
    <input type="text" id="classLocInput" placeholder="Room / link (optional)">
    <div class="color-row" id="colorRow"></div>
    <div class="editor-actions">
      <button class="clear-btn" id="clearBtn">Clear</button>
      <button class="cancel-btn" id="cancelBtn">Cancel</button>
      <button class="save-btn" id="saveBtn">Save</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'timetableWidget';
  const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat'];
  const START_HOUR = 8;
  const END_HOUR = 18; // exclusive
  const COLORS = ['#C87FA0','#6C9BC4','#8FBF8F','#E8A468','#E8C468','#B08FD6'];

  function hourLabel(h){
    const period = h < 12 ? 'AM' : 'PM';
    const hr = h % 12 === 0 ? 12 : h % 12;
    return `${hr} ${period}`;
  }

  function load(){
    try{
      const s = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if(s && typeof s === 'object') return s;
    }catch(e){}
    return {}; // key: "dayIdx-hour" -> {name, loc, color}
  }
  function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

  let state = load();
  let currentKey = null;
  let selectedColor = COLORS[0];

  function render(){
    const grid = document.getElementById('grid');
    let html = '<div class="corner"></div>';
    DAYS.forEach(d => html += `<div class="day-head">${d}</div>`);

    for(let h = START_HOUR; h < END_HOUR; h++){
      html += `<div class="time-label">${hourLabel(h)}</div>`;
      for(let d = 0; d < DAYS.length; d++){
        const key = `${d}-${h}`;
        const entry = state[key];
        if(entry){
          html += `<div class="cell filled" style="background:${entry.color}" data-key="${key}">
            <div class="class-name">${escapeHtml(entry.name)}</div>
            ${entry.loc ? `<div class="class-loc">${escapeHtml(entry.loc)}</div>` : ''}
          </div>`;
        } else {
          html += `<div class="cell" data-key="${key}"></div>`;
        }
      }
    }
    grid.innerHTML = html;
    grid.querySelectorAll('.cell').forEach(cell=>{
      cell.addEventListener('click', ()=> openEditor(cell.dataset.key));
    });

    renderLegend();
  }

  function renderLegend(){
    const names = new Set();
    const legendItems = [];
    Object.values(state).forEach(e=>{
      if(!names.has(e.name)){
        names.add(e.name);
        legendItems.push(e);
      }
    });
    const legend = document.getElementById('legend');
    if(legendItems.length===0){ legend.innerHTML=''; return; }
    legend.innerHTML = legendItems.map(e=>`
      <div class="legend-chip"><span class="legend-dot" style="background:${e.color}"></span>${escapeHtml(e.name)}</div>
    `).join('');
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function openEditor(key){
    currentKey = key;
    const entry = state[key];
    document.getElementById('editorTitle').textContent = entry ? 'Edit class' : 'Add class';
    document.getElementById('classNameInput').value = entry ? entry.name : '';
    document.getElementById('classLocInput').value = entry ? entry.loc || '' : '';
    selectedColor = entry ? entry.color : COLORS[Math.floor(Math.random()*COLORS.length)];
    renderColorRow();
    document.getElementById('overlay').classList.add('open');
    document.getElementById('classNameInput').focus();
  }

  function renderColorRow(){
    const row = document.getElementById('colorRow');
    row.innerHTML = COLORS.map(c=>`
      <div class="color-dot ${c===selectedColor?'selected':''}" style="background:${c}" data-color="${c}"></div>
    `).join('');
    row.querySelectorAll('.color-dot').forEach(dot=>{
      dot.addEventListener('click', ()=>{
        selectedColor = dot.dataset.color;
        renderColorRow();
      });
    });
  }

  document.getElementById('saveBtn').addEventListener('click', ()=>{
    const name = document.getElementById('classNameInput').value.trim();
    if(!name){ closeEditor(); return; }
    const loc = document.getElementById('classLocInput').value.trim();
    state[currentKey] = { name, loc, color: selectedColor };
    save();
    closeEditor();
    render();
  });
  document.getElementById('clearBtn').addEventListener('click', ()=>{
    delete state[currentKey];
    save();
    closeEditor();
    render();
  });
  document.getElementById('cancelBtn').addEventListener('click', closeEditor);
  document.getElementById('overlay').addEventListener('click', (e)=>{
    if(e.target.id === 'overlay') closeEditor();
  });

  function closeEditor(){
    document.getElementById('overlay').classList.remove('open');
    currentKey = null;
  }

  render();
</script>

</body>
</html>
